<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Google</title>
    <link rel="stylesheet" href="css/styles.css">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200">
</head>
<body>
    <div class="img-container">
    <img src="images/google.png" alt="Google">
    </div>
    <div class="search" id="centre">
        <div class="search" id="container">
            <span class="material-symbols-outlined" id="search">search</span>
            <textarea name="search" rows="1"></textarea>
            <img id="mic" src="images/Gmic.svg" alt="Google search">
            <img id="lens" src="images/glens.png" alt="Google lens">
        </div>
    </div>
    <div class="menu">
        <span class="material-symbols-outlined" id="account_circle">account_circle</span>
        <span class="material-symbols-outlined" id="apps">apps</span>
        <span class="material-symbols-outlined" id="experiment">experiment</span>
        <p id="images">Images</p>
        <p id="gmail">Gmail</p>
    </div>
    <div class="offer">
        <p id="offer-eng">Google offered in: </p>
        <a href="#">اردو</a>
        <a href="#">پشتو</a>
        <a href="#">سندھی</a>
    </div>
</body>
</html>
